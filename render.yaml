services:
  - type: web
    name: proshno-potro-api
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium chromium-headless-shell
    startCommand: playwright install chromium-headless-shell && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: proshno-potro
      - key: COLLECTION_NAME
        value: mcq
